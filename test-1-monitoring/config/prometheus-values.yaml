# Custom values for kube-prometheus-stack
grafana:
  service:
    type: ClusterIP
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      searchNamespace: ALL
prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    alertmanagerSpec:
      config:
        global:
          resolve_timeout: 5m
        route:
          group_by: ['alertname']
          receiver: 'dummy'
        receivers:
        - name: 'dummy'
          webhook_configs:
          - url: 'http://dummy-webhook:8080'   # replace in production
